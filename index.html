<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/textContainer.css" />
    <link rel="stylesheet" href="styles/btnContainer.css" />
    <title>Cifra de César</title>
  </head>
  <body>
    <h1>cifra de césar</h1>
    <div id="container">
      <div id="textContainer">
        <textarea rows="30" cols="60" id="cipherArea"></textarea>
        <textarea rows="30" cols="60" id="decipherArea"></textarea>
      </div>
      
      <div id="btnContainer">
        <label for="displacement" id="dispText">Deslocamento(máx 26)</label>
        <input type="number" id="displacement" min="1" max="26" step="1" value="1"></input>
        <button id="cipherBtn">codificar</button>
        <button id="decipherBtn">decodificar</button>
      </div>
    </div>
  </body>
  <script src="scripts/script.js" type="module"></script>
</html>
